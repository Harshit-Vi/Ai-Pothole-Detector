version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgis/postgis:15-3.3
    container_name: pothole-detector-db
    environment:
      POSTGRES_USER: ${DB_USER:-pothole_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-pothole_detector}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pothole-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pothole_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pothole-detector-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pothole-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pothole-detector-backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-pothole_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-pothole_detector}
      REDIS_URL: redis://redis:6379/0
      API_HOST: 0.0.0.0
      API_PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
    networks:
      - pothole-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pothole-detector-celery
    command: celery -A backend.tasks worker --loglevel=info
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-pothole_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-pothole_detector}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
    networks:
      - pothole-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pothole-detector-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - pothole-network

volumes:
  postgres_data:
  redis_data:

networks:
  pothole-network:
    driver: bridge
